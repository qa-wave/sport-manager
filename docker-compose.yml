services:
  postgres:
    image: postgres:16-alpine
    container_name: branik-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: branik
      POSTGRES_PASSWORD: branik
      POSTGRES_DB: branik
    ports:
      - "5432:5432"
    volumes:
      - branik_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U branik -d branik"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: branik-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - branik_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  branik_pgdata:
  branik_redisdata:
