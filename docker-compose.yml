services:
  postgres:
    image: postgres:16-alpine
    container_name: club-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: club
      POSTGRES_PASSWORD: club
      POSTGRES_DB: club_app
    ports:
      - "5432:5432"
    volumes:
      - club_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U club -d club_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: club-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - club_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  club_pgdata:
  club_redisdata:
