<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — Sport Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0b0f;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #111318;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.25rem;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 32px;
      height: 32px;
      color: white;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #f9fafb;
    }

    p {
      font-size: 0.875rem;
      color: #9ca3af;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      background: rgba(255,165,0,0.1);
      border: 1px solid rgba(255,165,0,0.25);
      color: #fbbf24;
      border-radius: 9999px;
      padding: 0.375rem 0.875rem;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fbbf24;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.625rem 1.5rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }

    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: rgba(156,163,175,0.5);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <path d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 17.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z" />
      </svg>
    </div>

    <div class="badge">
      <div class="badge-dot"></div>
      Bez připojení
    </div>

    <h1>Jste offline</h1>
    <p>
      Připojení k internetu není dostupné. Data ze Sport Manageru
      se automaticky synchronizují, jakmile se připojení obnoví.
    </p>

    <button class="btn" onclick="tryReconnect()">
      Zkusit znovu
    </button>

    <div class="footer">Sport Manager &mdash; data se brzy synchronizují</div>
  </div>

  <script>
    function tryReconnect() {
      if (navigator.onLine) {
        window.location.href = '/admin';
      } else {
        window.location.reload();
      }
    }

    // Auto-redirect when back online
    window.addEventListener('online', function () {
      setTimeout(function () {
        window.location.href = '/admin';
      }, 500);
    });

    // Trigger mutation queue replay
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({ type: 'REPLAY_MUTATIONS' });
    }
  </script>
</body>
</html>
