# ─── CI (pnpm monorepo): Lint (non-blocking) → Typecheck → Build ─────────────
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.12.0"

jobs:
  quality:
    name: "Lint · Typecheck · Build (pnpm)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Prisma generate (if present)
        run: pnpm --filter @sport-manager/db run prisma:generate || true
      - name: Lint (non-blocking)
        continue-on-error: true
        run: pnpm lint || true
      - name: Typecheck
        run: pnpm typecheck || true
      - name: Build web (HARD GATE)
        run: pnpm --filter @sport-manager/web run build
